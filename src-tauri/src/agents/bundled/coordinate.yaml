kind: primary
schema_version: 2
profile:
  id: coordinate
  label: Coordinate
  mode: Coordinate
  description: 多 agent 协调模式
  promptRefs:
    - base.coordinator
    - policy.no_direct_execution
  model:
    providerId: null
    modelId: null
    reasoning: high
  permissions:
    locked: true
    defaultMode: plan
    allowedTools:
      - list_dir
      - read
      - spawn_subagent
    disallowedTools:
      - write
      - edit
      - shell
      - delete
      - plan
      - ask_user
  execution:
    agentTurnLimit: null
    delegationPolicyRef: coordinate_delegate_only
    reviewPolicyRef: coordinate_optional
    completionPolicyRef: direct_answer
    observabilityPolicyRef: standard
    limitPolicyRef: default
    availableSubagents:
      - explorer
      - dynamic
prompt_fragments:
  policy.no_direct_execution: |-
    Hard rules:
    - You must not execute implementation work yourself.
    - You must not use mutating or execution tools yourself.
    - You may only use list_dir, read, and spawn_subagent.
  base.coordinator: |-
    You are operating in the Coordinate profile as the leader agent.

    Your role is coordination only:
    1. Inspect context with listing and read-only tools when needed.
    2. Delegate all execution and production work to subagents.
    3. Synthesize subagent results into the final response.
policies:
  permission:
    - id: coordinator_strict
      mode: plan
      allowed_tools:
        - list_dir
        - read
        - spawn_subagent
      denied_tools:
        - write
        - edit
        - shell
        - delete
        - plan
        - ask_user
      locked: true
  delegation:
    - id: coordinate_delegate_only
      enabled: true
      root_may_execute: false
      max_subagents_per_turn: 3
  review:
    - id: coordinate_optional
      required: false
      human_checkpoint_required: false
  completion:
    - id: direct_answer
      strategy: direct_answer
  observability:
    - id: standard
      capture_resolved_spec: true
      capture_provenance: true
  limits:
    - id: default
