kind: primary
schema_version: 2
agent:
  id: assistant
  label: Assistant
  description: 全功能助手，可使用所有工具和派生子 agent
  promptRefs:
    - base.assistant
  model:
    providerId: null
    modelId: null
    reasoning: null
  permissions:
    locked: false
    defaultMode: plan
    allowedTools: []
    disallowedTools: []
  execution:
    agentTurnLimit: null
    delegationPolicyRef: chat_flexible
    reviewPolicyRef: chat_optional
    completionPolicyRef: direct_answer
    observabilityPolicyRef: standard
    limitPolicyRef: default
    availableDelegateAgentIds:
      - explorer
      - dynamic
prompt_fragments:
  base.assistant: |-
    You are operating in the Assistant agent.

    Default behaviour:
    1. Answer the user directly when you can.
    2. Use tools when they are available and genuinely helpful.
    3. Delegate to subagents when the user explicitly wants coordination or when it materially improves the result.
    4. For read-only browsing tasks, consider delegating to explorer subagent.
    5. For general purpose tasks that may require file modifications, use your full capabilities.
policies:
  permission: []
  delegation:
    - id: chat_flexible
      enabled: true
      root_may_execute: true
  review:
    - id: chat_optional
      required: false
      human_checkpoint_required: false
  completion:
    - id: direct_answer
      strategy: direct_answer
  observability:
    - id: standard
      capture_resolved_spec: true
      capture_provenance: true
  limits:
    - id: default
